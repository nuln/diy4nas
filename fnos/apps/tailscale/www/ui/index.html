<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tailscale</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0f17;--bg2:#131822;--bg3:#1c2333;--card:#1a2130;--fg:#e8edf5;--fg2:#8892b0;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);padding:0;padding-bottom:64px;min-height:100vh}
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px;max-width:100%;margin:0 auto}
.hd h1{font-size:1.15rem;font-weight:700}
.st{font-size:.72rem;padding:4px 12px;border-radius:20px;font-weight:500}
.st.on{background:rgba(34,197,94,.12);color:var(--green)}.st.off{background:rgba(239,68,68,.12);color:var(--red)}
.ct{padding:8px 14px;max-width:100%;margin:0 auto}
.pt{display:none}.pt.act{display:block;animation:fade .2s}
#pt-tp.act,#pt-lg.act{max-width:100%;margin-left:auto;margin-right:auto}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cd{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
.cd h3{font-size:.82rem;font-weight:600;margin-bottom:10px;color:var(--fg2);letter-spacing:.3px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.si{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.si .l{font-size:.65rem;color:var(--fg2);margin-bottom:2px}.si .v{font-size:.95rem;font-weight:600}
.si .ip{font-size:.72rem;font-family:monospace;color:var(--blue)}
#ch{width:100%;height:55px;border-radius:8px;background:var(--bg3);display:block;margin:6px 0 2px}
.fg{margin-bottom:8px}.fg label{display:block;font-size:.72rem;color:var(--fg2);margin-bottom:3px;font-weight:500}
.fg input,.fg select{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid transparent;border-radius:8px;color:var(--fg);font-size:.82rem;outline:none}
.fg input:focus{border-color:var(--blue)}
.fg .rw{display:flex;gap:8px}.fg .rw>*{flex:1}
.cx{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 10px}
.cx label{display:flex;align-items:center;gap:5px;font-size:.76rem;color:var(--fg2);cursor:pointer}
.cx input{accent-color:var(--blue);cursor:pointer}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.dv{background:var(--bg3);border-radius:8px;padding:10px;transition:.08s}
.dv .hdv{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dv .nm{font-size:.8rem;font-weight:500}.dv .ip{font-size:.68rem;color:var(--fg2);font-family:monospace;margin-top:2px}
.dv .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dv .dot.g{background:var(--green)}.dv .dot.r{background:var(--red)}
.dv .act{display:flex;gap:4px;margin-top:6px}
.dv .act button{padding:3px 8px;border:none;border-radius:4px;font-size:.65rem;cursor:pointer;background:var(--bg2);color:var(--fg2)}
.dv .act button.pi{background:rgba(59,130,246,.15);color:var(--blue)}
.lb{background:var(--bg3);border-radius:8px;padding:10px;font:13px/1.5 monospace;color:var(--fg2);white-space:pre-wrap;max-height:260px;overflow-y:auto;margin-top:6px}
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);display:flex;border-top:1px solid rgba(255,255,255,.05);padding:4px 0 env(safe-area-inset-bottom)}
.bn a{flex:1;text-align:center;padding:5px 2px;font-size:.58rem;color:var(--fg2);text-decoration:none;cursor:pointer}
.bn a.act{color:var(--blue)}
.bn a svg{display:block;margin:0 auto 2px;width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btnw{width:100%;padding:9px;border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;margin-top:4px}
.btnw.p{background:var(--blue);color:#fff}.btnw.s{background:var(--bg3);color:var(--fg2)}
.row{display:flex;flex-wrap:wrap;gap:12px}.col{flex:1;min-width:320px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-c{background:var(--card);border-radius:var(--radius);width:90%;max-width:400px;padding:16px;max-height:60vh;overflow-y:auto}
.modal-c h3{margin-bottom:6px;font-size:.9rem}.modal-c .mb{font-size:.78rem;color:var(--fg2)}
</style>
</head>
<body>
<div class="hd"><h1>Tailscale</h1><span id="st" class="st off">离线</span></div>
<div class="ct">

<div id="pt-ov" class="pt act">
<div id="login-area" style="display:block">
<div class="cd" id="login-prompt" style="text-align:center;padding:20px">
<p style="font-size:.85rem;color:var(--fg2);margin-bottom:10px">登录 Tailscale 网络</p>
<div class="fg" style="margin-bottom:8px"><input id="ak" placeholder="Auth Key（可选）" style="width:100%;padding:9px 11px;background:var(--bg3);border:1px solid transparent;border-radius:8px;color:var(--fg);font-size:.82rem;outline:none"></div>
<div class="fg" style="margin-bottom:8px"><input id="ls" placeholder="Login Server（Headscale，可选）" style="width:100%;padding:9px 11px;background:var(--bg3);border:1px solid transparent;border-radius:8px;color:var(--fg);font-size:.82rem;outline:none"></div>
<div style="display:flex;gap:8px"><button class="btnw p" style="flex:1" onclick="ck()">Key 连接</button><button class="btnw s" style="flex:1" onclick="wb()">Web 认证</button></div>
</div>
<div class="cd" id="reconnect-prompt" style="display:none;text-align:center;padding:20px">
<p style="font-size:.85rem;color:var(--fg2);margin-bottom:10px">Tailscale 已断开</p>
<button class="btnw p" onclick="rc()">重新连接</button>
</div>
<div class="cd" id="reauth-prompt" style="display:none;text-align:center;padding:20px">
<p style="font-size:.85rem;color:var(--fg2);margin-bottom:10px">认证已失效，请重新登录</p>
<button class="btnw p" onclick="wb()">重新认证</button>
</div>
<div class="cd" id="pending-prompt" style="display:none;text-align:center;padding:20px">
<p style="font-size:.85rem;color:var(--green);margin-bottom:6px">✓ 认证成功</p>
<p style="font-size:.82rem;color:var(--fg2);margin-bottom:10px">正在等待分配 IP，请稍候...</p>
</div>
</div>
<div id="dashboard-area" style="display:none">
<div class="row" style="display:flex;gap:12px">
<div class="col" style="flex:1;min-width:0">
<div class="cd">
<h3 style="display:flex;justify-content:space-between;align-items:center;">
<span>📈 运行状态</span>
<button id="btn-refresh" onclick="forceRefreshStatus()" style="background:none;border:none;color:var(--fg2);cursor:pointer;font-size:1.15rem;line-height:1;transition:transform 0.5s ease-in-out;padding:2px 4px;margin-right:2px;" title="强制从后台拉取最新数据">↻</button>
</h3>
<div class="sg" id="sg"></div>
<div style="margin:6px 0"><canvas id="ch" height="55"></canvas></div>
<div style="display:flex;gap:8px;margin-top:8px">
<button id="btn-connect" class="btnw s" style="margin-top:0;flex:1" onclick="toggleConnect()">断开连接</button>
<button class="btnw s" style="margin-top:0;flex:1;background:rgba(239,68,68,0.15);color:var(--red)" onclick="logout()">退出登录</button>
</div>
<div style="border-top:1px solid rgba(255,255,255,.05);padding-top:8px;margin-top:8px">
<div class="fg" style="margin:0"><label>代理地址（用于连接 DERP 中继）</label>
<div class="rw"><input id="proxy-input" placeholder="http://127.0.0.1:7890，留空=直连"><button class="btnw s" style="margin-top:0;flex:0;padding:9px 16px;white-space:nowrap" onclick="saveProxy()">保存</button></div>
</div>
</div>
</div>
</div>
<div class="col" style="flex:1;min-width:0">
<div class="cd"><h3>⚙️ 节点配置</h3>
<div class="fg"><div class="rw"><div><label>主机名</label><input id="hn" placeholder="自定义名称"></div><div><label>子网路由</label><input id="rt" placeholder="192.168.1.0/24"></div></div></div>
<div class="fg"><label>出口节点</label><select id="ex"><option value="">不指定</option></select></div>
<div class="cx">
<label><input type="checkbox" checked id="ck-dns"> 接受 DNS</label>
<label><input type="checkbox" id="ck-shields"> Shields Up</label>
<label><input type="checkbox" checked id="ck-routes"> 接受路由</label>
<label><input type="checkbox" id="ck-exit"> 设为出口节点</label>
<label><input type="checkbox" id="ck-ssh"> 启用 SSH</label>
<label><input type="checkbox" id="ck-lan"> 出口节点允许局域网</label>
<label><input type="checkbox" checked id="ck-snat"> SNAT 子网路由</label>
<label><input type="checkbox" checked id="ck-filter"> 状态过滤</label>
</div>
<div class="fg"><label>Netfilter 模式</label><select id="nf-mode"><option value="">默认</option><option value="on">on</option><option value="off">off</option><option value="nodivert">nodivert</option></select></div>
<button class="btnw p" onclick="ap()">应用</button>
</div>
</div>
</div>
</div>
</div>

<div id="pt-tp" class="pt">
<div class="cd">
<h3 style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
<span>网络拓扑图</span>
<span style="display:flex;gap:6px;align-items:center;position:relative">
<span style="position:relative">
<button onclick="toggleTopoMenu()" style="background:none;border:none;color:var(--fg2);cursor:pointer;font-size:1rem;line-height:1">⚙</button>
<div id="topo-menu" style="display:none;position:absolute;right:0;top:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px;z-index:10;min-width:140px">
<button onclick="toggleZoom();toggleTopoMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--fg);cursor:pointer;font-size:.72rem;white-space:nowrap">🔒 锁定缩放</button>
<button id="btn-batch-ping" onclick="batchPing();toggleTopoMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--fg);cursor:pointer;font-size:.72rem;white-space:nowrap">📡 Ping 所有节点</button>
<button onclick="resetTopoZoom();toggleTopoMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--fg);cursor:pointer;font-size:.72rem;white-space:nowrap">🔁 还原视图</button>
</div>
</span>
</span>
</h3>
<div style="display:flex;gap:12px;margin-top:6px">
<div style="width:180px;flex-shrink:0;height:calc(100vh - 190px);min-height:450px;overflow-y:auto">
<div style="font-size:.72rem;color:var(--fg2);margin-bottom:6px;padding:0 4px">设备 <span id="dc" style="font-weight:400"></span></div>
<div class="dg" id="dl" style="grid-template-columns:1fr"></div>
</div>
<div id="topo-container" style="flex:1;min-width:200px;height:calc(100vh - 190px);min-height:450px;background:var(--bg3);border-radius:8px;position:relative;overflow:hidden"></div>
<div id="detail-panel" style="display:none;flex:1;min-width:200px;height:calc(100vh - 190px);min-height:450px;background:var(--bg3);border-radius:8px;padding:16px;overflow-y:auto"></div>
</div>
</div>
</div>
</div>

<div id="pt-lg" class="pt">
<div class="cd">
<div style="display:flex;gap:6px;margin-bottom:10px">
<button id="lg-tab-ts" class="btnw s" style="margin-top:0;flex:1;background:var(--blue);color:#fff" onclick="switchLog('ts')">Tailscale 日志</button>
<button id="lg-tab-app" class="btnw s" style="margin-top:0;flex:1" onclick="switchLog('app')">应用操作日志</button>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
<span style="font-size:.72rem;color:var(--fg2)" id="lg-title">Tailscale 日志</span>
<span style="position:relative">
<button onclick="toggleLogMenu()" style="background:none;border:none;color:var(--fg2);cursor:pointer;font-size:1rem;line-height:1">⚙</button>
<div id="lg-menu" style="display:none;position:absolute;right:0;top:100%;background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px;z-index:10;min-width:140px">
<button onclick="toggleAutoRefresh();toggleLogMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--fg);cursor:pointer;font-size:.72rem;white-space:nowrap" id="lg-auto-btn">⏸ 暂停自动刷新</button>
<button onclick="lg(true);toggleLogMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--fg);cursor:pointer;font-size:.72rem;white-space:nowrap">🔄 立即刷新</button>
<button onclick="clearLog();toggleLogMenu()" style="display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--red);cursor:pointer;font-size:.72rem;white-space:nowrap">🗑 清空日志</button>
</div>
</span>
</div>
<div class="lb" id="lg-out" style="height:calc(100vh - 180px);min-height:450px;font-size:.72rem">点击刷新加载日志</div></div>
</div>

<div class="bn">
<a data-p="ov"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>概览</a>
<a data-p="tp"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="6.5" y2="16.5"/><line x1="12" y1="8" x2="17.5" y2="16.5"/><line x1="8" y1="19" x2="16" y2="19"/></svg>拓扑</a>
<a data-p="lg"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>日志</a>
</div>

<!-- Error Modal -->
<div class="modal" id="em"><div class="modal-c" style="max-width:90vw">
<h3>错误</h3>
<div class="lb" id="em-text" style="max-height:400px;font-size:.78rem;user-select:text"></div>
<button class="btnw s" onclick="document.getElementById('em').classList.remove('show')">关闭</button>
</div></div>

<!-- Auth Modal -->
<div class="modal" id="au"><div class="modal-c">
<h3>登录 Tailscale</h3>
<p style="font-size:.82rem;color:var(--fg2);margin-bottom:10px">点击下方链接登录 Tailscale 完成认证：</p>
<a id="au-link" href="#" target="_blank" style="display:block;word-break:break-all;font-size:.78rem;color:var(--blue);margin-bottom:12px;text-decoration:underline"></a>
<button class="btnw s" onclick="document.getElementById('au').classList.remove('show');toast('认证完成后请等待自动连接')">关闭</button>
</div></div>

<div class="modal" id="pm"><div class="modal-c">
<h3>Ping <span id="pm-target" style="font-weight:400;color:var(--fg2)"></span></h3>
<div class="lb" id="pm-out" style="max-height:300px;margin-bottom:12px">正在测试...</div>
<div style="display:flex;gap:8px">
<button class="btnw p" id="btn-ping-stop" style="display:none;background:var(--red);margin-top:0" onclick="stopPing()">停止</button>
<button class="btnw s" id="btn-ping-close" style="margin-top:0" onclick="closePing()">关闭</button>
</div>
</div></div>

<script>
const $=x=>document.getElementById(x),F=b=>{if(!b)return'0 B';const u=['B','KB','MB','GB'];let i=0,v=b;while(v>=1024&&i<3){v/=1024;i++}return v.toFixed(1)+' '+u[i]};
const api=async(p,m,b)=>{try{const r=await fetch('/api/'+p,{method:m||'GET',body:b?JSON.stringify(b):null,headers:{'Content-Type':'application/json'}});return await r.json()}catch(e){return{error:'请求失败: '+e.message}}};
const showErr=m=>{document.getElementById('em-text').textContent=m;document.getElementById('em').classList.add('show')};
const showAuthUrl=url=>{const a=document.getElementById('au-link');a.textContent=url;a.href=url;document.getElementById('au').classList.add('show')};
const toast=(m,t)=>{document.querySelectorAll('.app-toast').forEach(x=>x.remove());const d=document.createElement('div');d.className='app-toast';d.textContent=m;d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1c2333;color:#e8edf5;padding:10px 18px;border-radius:8px;font-size:.8rem;z-index:999;max-width:90vw;word-break:break-all';document.body.appendChild(d);setTimeout(()=>d.remove(),t||5000)};
document.querySelectorAll('.bn a').forEach(a=>a.onclick=()=>{document.querySelectorAll('.bn a').forEach(x=>x.classList.toggle('act',x.dataset.p===a.dataset.p));document.querySelectorAll('.pt').forEach(x=>x.classList.toggle('act',x.id==='pt-'+a.dataset.p));if(a.dataset.p==='tp'){drawTopo()}if(a.dataset.p==='ov'){drawChart();stopLogRefresh()}if(a.dataset.p==='lg'){lg(true);startLogRefresh()}});
const goto=p=>{document.querySelectorAll('.bn a').forEach(x=>x.classList.toggle('act',x.dataset.p===p));document.querySelectorAll('.pt').forEach(x=>x.classList.toggle('act',x.id==='pt-'+p));if(p==='tp')drawTopo();if(p==='ov'){drawChart();stopLogRefresh()}if(p==='lg'){lg(true);startLogRefresh()}};

let lastUpError = ''; let connecting = false; let stIntervalId = null; let ncResult = ''; let ncTimer = null; let ncLast = 0;
let appcRoutes = ''; let selfRoutes = ''; let isInitialized = false;
const cleanVersion = (v) => {
    if (!v) return '-';
    return v.split('-')[0].split('+')[0] || '-';
};
const updateRoutesUI = () => {
    let routes = [selfRoutes, appcRoutes].filter(Boolean).join(' | ');
    if (!routes) routes = '-';
    if ($('rt-val')) {
        $('rt-val').textContent = routes;
        if (routes.length > 15) {
            $('rt-val').style.fontSize = '.52rem';
        } else {
            $('rt-val').style.fontSize = '.65rem';
        }
    }
};
const fetchNetcheck=(force)=>{
    const now=Date.now();
    if(!force && now-ncLast<60000)return;
    ncLast=now;
    if($('nc-val')) $('nc-val').textContent = '检测中...';
    fetch('/api/netcheck' + (force ? '?force=true' : '')).then(r=>r.json()).then(d=>{
        if(d&&d.output){
             try{
                let j=JSON.parse(d.output);
                if(j){
                    if(j.PreferredDERP && j.RegionLatency){
                        const lat = j.RegionLatency[String(j.PreferredDERP)];
                        ncResult = lat !== undefined ? Math.round(lat / 1e6) + ' ms' : '已检测';
                    } else if(j.RegionLatency) {
                        const keys = Object.keys(j.RegionLatency);
                        ncResult = keys.length > 0 ? Math.round(j.RegionLatency[keys[0]] / 1e6) + ' ms' : '已检测';
                    } else {
                        ncResult = '已检测';
                    }
                } else {
                    ncResult = '已检测';
                }
            }catch(e){
                ncResult='已检测';
            }
        } else {
            let errMsg = (d && d.error) ? d.error : '检测失败';
            if (errMsg.length > 30) errMsg = errMsg.slice(0, 27) + '...';
            ncResult = errMsg;
        }
        if($('nc-val')) $('nc-val').textContent = ncResult;
    }).catch(()=>{
        ncResult = '检测失败';
        if($('nc-val')) $('nc-val').textContent = ncResult;
    });
};
const fetchRoutes=()=>{
    fetch('/api/appc-routes').then(r=>r.json()).then(d=>{
        if(d&&d.output){
            const out = d.output.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '').trim();
            const lower = out.toLowerCase();
            appcRoutes = (out && !lower.includes('not a connector') && !lower.includes('error') && !lower.includes('failed')) ? out : '';
            updateRoutesUI();
        }
    }).catch(()=>{})
};
let refreshing = false;
const forceRefreshStatus = async () => {
    if (refreshing) return;
    refreshing = true;
    const btn = $('btn-refresh');
    if (btn) btn.style.transform = 'rotate(360deg)';
    toast('正在强制拉取最新数据...');
    try {
        await Promise.all([
            st(true),
            fetchNetcheck(true)
        ]);
        toast('数据已刷新');
    } catch(e) {
        toast('刷新失败: ' + e.message);
    } finally {
        setTimeout(() => {
            if (btn) btn.style.transform = 'rotate(0deg)';
            refreshing = false;
        }, 500);
    }
};
const nm=n=>{if(!n)return'';const p=n.indexOf('.');return p>0?n.slice(0,p):n};
const ip=x=>x.TailAddr||(x.TailscaleIPs&&x.TailscaleIPs[0])||'-';

if(r&&r.output){const res=parsePing(r.output);setLat(ipAddr,res.loss==='100%'?'超时':res.avg+' ms')}else{setLat(ipAddr,'超时')}
}catch(e){setLat(ipAddr,'超时')}
}));
}
if(topoNetwork&&topoNetwork.body&&topoNetwork.body.data){
const edges=topoNetwork.body.data.edges;
Object.keys(peersData).forEach(id=>{
if(id==='self')return;
const p=peersData[id];const addr=ip(p);
if(getLat(addr)){edges.update({id:'edge-'+id,label:getLat(addr),font:{size:10,color:'#10b981'}})}
});
}
toast('测速完成');await st();
}catch(e){toast('测速出错: '+e.message)}finally{btn.disabled=false;btn.textContent='Ping'}
};
let touchStartX=0;let touchEndX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{touchEndX=e.changedTouches[0].screenX;handleSwipe()},{passive:true});
const handleSwipe=()=>{
const tabs=['ov','tp','lg'];const activeLink=document.querySelector('.bn a.act');if(!activeLink)return;
const currentTab=activeLink.dataset.p;const currentIndex=tabs.indexOf(currentTab);if(currentIndex===-1)return;
const diff=touchEndX-touchStartX;
if(Math.abs(diff)>80){
let newIndex=currentIndex;
if(diff>0&&currentIndex>0){newIndex=currentIndex-1}else if(diff<0&&currentIndex<tabs.length-1){newIndex=currentIndex+1}
if(newIndex!==currentIndex){const nextTabId=tabs[newIndex];const nextLink=document.querySelector(`.bn a[data-p="${nextTabId}"]`);if(nextLink)nextLink.click()}
}
};
document.addEventListener('click',e=>{const m=$('topo-menu');if(m&&!e.target.closest('#topo-menu')&&!e.target.closest('button[onclick*="toggleTopoMenu"]'))m.style.display='none';const lm=$('lg-menu');if(lm&&!e.target.closest('#lg-menu')&&!e.target.closest('button[onclick*="toggleLogMenu"]'))lm.style.display='none'});
st();stIntervalId=setInterval(st,3000);
api('proxy').then(r=>{if(r&&r.proxy!==undefined)$('proxy-input').value=r.proxy});
window.addEventListener('resize',()=>{const a=document.querySelector('.bn a.act');if(a&&a.dataset.p==='ov')drawChart()});
</script>
</body></html>
